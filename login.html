<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060a14">
<title>MedRep CRM — Login</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050505;--surface:#080810;--surface2:#0d0d1a;
    --border:rgba(59,130,246,0.12);--accent:#2563eb;--accent2:#0891b2;
    --green:#10b981;--text:#e2e8f0;--muted:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 10% -10%,rgba(59,130,246,0.2) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 90% 110%,rgba(8,145,178,0.14) 0%,transparent 60%);pointer-events:none;z-index:0;}
  .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

  .wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px 18px;}

  /* Header */
  .header{text-align:center;margin-bottom:32px;animation:slideDown 0.7s cubic-bezier(0.16,1,0.3,1);}
  .logo-ring{width:86px;height:86px;border-radius:26px;background:linear-gradient(135deg,rgba(59,130,246,0.18),rgba(8,145,178,0.18));border:1px solid rgba(59,130,246,0.25);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 0 40px rgba(59,130,246,0.24);overflow:hidden;}
  .site-logo{width:100%;height:100%;object-fit:cover;display:block;}
  .logo-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.22);border-radius:100px;padding:5px 15px;font-size:10px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);margin-bottom:14px;}
  .logo-badge span{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
  h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;background:linear-gradient(135deg,#e2e8f0 0%,#93c5fd 50%,#67e8f9 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
  .subtitle{color:var(--muted);font-size:13px;}

  /* Card */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:28px 24px;position:relative;overflow:hidden;animation:slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both;box-shadow:0 0 60px rgba(59,130,246,0.08),0 24px 48px rgba(0,0,0,0.4);}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.4),transparent);}

  .section-label{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent2);margin:0 0 18px;display:flex;align-items:center;gap:8px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  .field{position:relative;margin-bottom:14px;}
  .field label{display:block;font-size:11px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;transition:color 0.2s;}
  .field:focus-within label{color:var(--accent2);}
  .fi{position:absolute;left:14px;top:38px;font-size:14px;pointer-events:none;}
  input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:13px 13px 13px 42px;outline:none;transition:border-color 0.25s,box-shadow 0.25s,background 0.25s;appearance:none;}
  input::placeholder{color:#3d5070;}
  input:focus{border-color:rgba(59,130,246,0.5);box-shadow:0 0 0 3px rgba(59,130,246,0.1);background:#131f38;}

  /* Error shake */
  .field.shake input{animation:shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97);}
  .err-msg{font-size:12px;color:#f87171;font-family:'Syne',sans-serif;font-weight:600;margin-top:6px;display:none;}
  .err-msg.show{display:block;}

  /* Buttons */
  .btn-login{width:100%;padding:15px;background:linear-gradient(135deg,#2563eb,#0891b2);border:none;border-radius:14px;color:white;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;margin-top:6px;box-shadow:0 8px 24px rgba(37,99,235,0.35);}
  .btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(37,99,235,0.45);}
  .btn-login:active{transform:translateY(0);}
  .btn-shine{position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);transform:skewX(-20deg);transition:left 0.5s;}
  .btn-login:hover .btn-shine{left:150%;}
  .btn-login.loading{pointer-events:none;opacity:0.7;}
  .btn-login.loading::after{content:'';position:absolute;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;right:20px;top:50%;transform:translateY(-50%);animation:spin 0.7s linear infinite;}

  /* Divider */
  .divider{display:flex;align-items:center;gap:12px;margin:18px 0;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
  .divider span{font-size:11px;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;}

  /* Guest button */
  .btn-guest{width:100%;padding:13px;background:transparent;border:1px solid rgba(59,130,246,0.2);border-radius:14px;color:#94a3b8;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.5px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-guest:hover{border-color:rgba(59,130,246,0.4);color:var(--text);background:rgba(59,130,246,0.05);}
  .guest-badge{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.25);border-radius:100px;padding:2px 8px;font-size:10px;font-family:'Syne',sans-serif;font-weight:700;}

  /* Footer */
  .footer{text-align:center;margin-top:22px;font-size:12px;color:var(--muted);font-family:'DM Sans',sans-serif;animation:slideUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.2s both;}
  .footer strong{color:var(--accent2);}
  .footer a{color:var(--accent);text-decoration:none;font-weight:600;}
  .footer a:hover{color:var(--accent2);}


  /* iPhone safe areas & touch */
  body{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
  button,a,.action-btn,.btn-save,.btn-login,.btn-guest,.priority-btn,.day-pill{touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
  input,select,textarea{font-size:16px!important;}
  .btn-save,.btn-login{min-height:52px;}
  .pd-item{min-height:44px;}
  .profile-widget{min-height:44px;}

  @keyframes slideDown{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  @keyframes spin{to{transform:translateY(-50%) rotate(360deg)}}
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-6px)}40%,60%{transform:translateX(6px)}}
  .welcome-screen{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 38%,rgba(8,145,178,0.18),transparent 36%),linear-gradient(135deg,#020617 0%,#06111f 55%,#020617 100%);animation:welcomeOut 0.7s ease 2.15s forwards;}
  .welcome-card{text-align:center;animation:welcomeIn 0.8s cubic-bezier(0.16,1,0.3,1) both;}
  .welcome-logo{width:min(44vw,220px);height:min(44vw,220px);object-fit:contain;filter:drop-shadow(0 0 34px rgba(8,145,178,0.45));animation:logoFloat 1.8s ease-in-out infinite;}
  .welcome-title{font-family:'Syne',sans-serif;font-size:clamp(28px,7vw,46px);font-weight:800;margin-top:16px;background:linear-gradient(135deg,#e2e8f0,#67e8f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .welcome-sub{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-top:7px;}
  @keyframes welcomeIn{from{opacity:0;transform:translateY(16px) scale(0.94)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes welcomeOut{to{opacity:0;visibility:hidden;pointer-events:none}}
  @keyframes logoFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.03)}}
  @media (prefers-reduced-motion:reduce){.welcome-screen{animation:none;display:none}.welcome-card,.welcome-logo{animation:none}}
/* ── INSANE UPGRADES ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:100px}
.floating-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.floating-orbs .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.28;animation:orbFloat 25s infinite ease-in-out}
.floating-orbs .orb:nth-child(1){width:340px;height:340px;background:var(--accent);top:-12%;left:-8%;animation-delay:0s}
.floating-orbs .orb:nth-child(2){width:280px;height:280px;background:var(--accent2);bottom:-10%;right:-5%;animation-delay:-8s}
.floating-orbs .orb:nth-child(3){width:220px;height:220px;background:var(--green);top:45%;left:45%;animation-delay:-16s;opacity:.15}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(40px,-50px) scale(1.12)}50%{transform:translate(-30px,25px) scale(.92)}75%{transform:translate(50px,35px) scale(1.08)}}
.tilt-3d{transition:transform .15s ease-out;transform-style:preserve-3d;will-change:transform}
.glow-hover{transition:box-shadow .35s,transform .25s}
.glow-hover:hover{box-shadow:0 0 28px rgba(8,145,178,.22),0 0 55px rgba(8,145,178,.08);transform:translateY(-2px)}
.ripple{position:relative;overflow:hidden}
.ripple-effect{position:absolute;border-radius:50%;background:rgba(255,255,255,.35);transform:scale(0);animation:rippleAnim .65s ease-out;pointer-events:none}
@keyframes rippleAnim{to{transform:scale(5);opacity:0}}
.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
#particleCanvas{position:fixed;inset:0;z-index:1;pointer-events:none}
.floating-orbs{z-index:1}
.card{transform-style:preserve-3d;position:relative}
@keyframes borderGlow{0%,100%{border-color:rgba(59,130,246,.12)}50%{border-color:rgba(8,145,178,.28)}}
.card{animation:borderGlow 4s ease-in-out infinite}
@keyframes gridPulse{0%,100%{opacity:1}50%{opacity:.6}}
.grid-bg{animation:gridPulse 8s ease-in-out infinite}
@media(max-width:680px){.tilt-3d{transform:none!important}.card{animation:none!important}.floating-orbs .orb{filter:blur(40px)}#particleCanvas{display:none}}
</style>
</head>
<body>
<div class="welcome-screen" id="welcomeScreen" aria-hidden="true">
  <div class="welcome-card">
    <img class="welcome-logo" src="medrep-logo.png" alt="">
    <div class="welcome-title">Welcome</div>
    <div class="welcome-sub">MedRep CRM</div>
  </div>
</div>
<div class="grid-bg"></div>
<div class="floating-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="wrap">

  <div class="header">
    <div class="logo-ring"><img class="site-logo" src="medrep-logo.png" alt="MedRep CRM logo"></div>
    <div class="logo-badge"><span></span> MedRep CRM</div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to access your doctors directory</p>
  </div>

  <div class="card">
    <div class="section-label">Admin Login</div>

    <div class="field" id="userField">
      <label>Username</label>
      <span class="fi">👤</span>
      <input id="username" type="text" placeholder="Enter username" autocomplete="username" onkeydown="if(event.key==='Enter')tryLogin()">
    </div>

    <div class="field" id="passField">
      <label>Password</label>
      <span class="fi">🔑</span>
      <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')tryLogin()">
      <div class="err-msg" id="errMsg">⚠️ Incorrect username or password</div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="tryLogin()">
      <span class="btn-shine"></span>
      <span id="loginBtnText">Sign In →</span>
    </button>

    <div class="divider"><span>or</span></div>

    <button class="btn-guest" onclick="guestLogin()">
      👁️ Continue as Guest &nbsp;<span class="guest-badge">VIEW ONLY</span>
    </button>
  </div>

  <div class="footer">
    <p>Built by <strong>Abdelrahman Usama</strong> · <a href="https://instagram.com/a.usama56" target="_blank">@a.usama56</a></p>
  </div>

</div>

<script>
  const ADMIN_USER = 'ausama56';
  const ADMIN_PASS = '2002';
  const SESSION_KEY = 'crm_session';
  const INACTIVITY_MS = 60 * 60 * 1000; // 1 hour

  // If already logged in, redirect straight to dashboard
  (function checkExisting() {
    const s = getSession();
    if (s) {
      const dest = sessionStorage.getItem('crm_redirect') || 'dashboard.html';
      sessionStorage.removeItem('crm_redirect');
      location.href = dest;
    }
  })();

  function getSession() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (Date.now() - s.lastActive > INACTIVITY_MS) {
        localStorage.removeItem(SESSION_KEY);
        return null;
      }
      return s;
    } catch { return null; }
  }

  function setSession(role) {
    localStorage.setItem(SESSION_KEY, JSON.stringify({ role, lastActive: Date.now() }));
  }

  function tryLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    if (u === ADMIN_USER && p === ADMIN_PASS) {
      btn.classList.add('loading');
      document.getElementById('loginBtnText').textContent = 'Signing in…';
      setSession('admin');
      setTimeout(() => {
        const dest = sessionStorage.getItem('crm_redirect') || 'dashboard.html';
        sessionStorage.removeItem('crm_redirect');
        location.href = dest;
      }, 700);
    } else {
      // Shake both fields & show error
      ['userField','passField'].forEach(id => {
        const f = document.getElementById(id);
        f.classList.remove('shake');
        void f.offsetWidth; // reflow
        f.classList.add('shake');
      });
      document.getElementById('errMsg').classList.add('show');
      document.getElementById('password').value = '';
    }
  }

  function guestLogin() {
    setSession('guest');
    const dest = sessionStorage.getItem('crm_redirect') || 'dashboard.html';
    sessionStorage.removeItem('crm_redirect');
    location.href = dest;
  }
</script>
<script>
// ── INSANE UPGRADES ──
(function(){const c=document.createElement('canvas');c.id='particleCanvas';document.body.prepend(c);const x=c.getContext('2d');let p=[];const s=['💊','🩺','❤️','⚕️','🏥','+'];function rs(){c.width=innerWidth;c.height=innerHeight}rs();addEventListener('resize',rs);class P{constructor(){this.R()}R(){this.x=Math.random()*c.width;this.y=c.height+20;this.s=12+Math.random()*16;this.sy=-(.3+Math.random()*.7);this.sx=(Math.random()-.5)*.5;this.sym=s[Math.floor(Math.random()*s.length)];this.o=.2+Math.random()*.3;this.r=Math.random()*Math.PI*2;this.rs=(Math.random()-.5)*.02}update(){this.x+=this.sx;this.y+=this.sy;this.r+=this.rs;if(this.y<-30)this.R()}draw(){x.save();x.globalAlpha=this.o;x.translate(this.x,this.y);x.rotate(this.r);x.font=this.s+'px sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(this.sym,0,0);x.restore()}}for(let i=0;i<18;i++){const n=new P();n.y=Math.random()*c.height;p.push(n)}function L(){x.clearRect(0,0,c.width,c.height);p.forEach(v=>{v.update();v.draw()});requestAnimationFrame(L)}L()})();

(function(){document.querySelectorAll('.card').forEach(e=>{e.classList.add('tilt-3d');e.addEventListener('mousemove',ev=>{const r=e.getBoundingClientRect(),x=ev.clientX-r.left,y=ev.clientY-r.top;const ry=(y-r.height/2)/r.height/2*-10,rx=(x-r.width/2)/r.width/2*10;e.style.transform='perspective(600px) rotateX('+ry+'deg) rotateY('+rx+'deg) scale3d(1.015,1.015,1.015)'});e.addEventListener('mouseleave',()=>{e.style.transform='perspective(600px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)'})})})();

(function(){document.querySelectorAll('.btn-login,.btn-guest').forEach(b=>{b.classList.add('ripple');b.addEventListener('click',function(ev){const r=this.getBoundingClientRect(),sp=document.createElement('span');sp.className='ripple-effect';sp.style.cssText='left:'+(ev.clientX-r.left)+'px;top:'+(ev.clientY-r.top)+'px;width:40px;height:40px';this.appendChild(sp);setTimeout(()=>sp.remove(),650)})})})();

(function(){const o=new IntersectionObserver(e=>{e.forEach(en=>{if(en.isIntersecting)en.target.classList.add('visible')})},{threshold:.08});document.querySelectorAll('.card').forEach(el=>{el.classList.add('reveal');o.observe(el)})})();

(function(){document.querySelectorAll('.card').forEach(e=>e.classList.add('glow-hover'))})();
</script>
</body>
</html>
