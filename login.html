<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Usamaz CRM">
<meta name="theme-color" content="#060a14">
<title>Usamaz CRM — Login</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a10;--surface:#12121a;--surface2:#1a1a26;--surface3:#22223a;--border:rgba(201,168,76,0.1);--gold:#c9a84c;--gold-light:#d4af37;--gold-dark:#a8882e;--teal:#1a7a85;--green:#10b981;--red:#ef4444;--text:#f0ede8;--muted:#8a8280}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);font-family:'Inter','DM Sans',sans-serif;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 10% -10%,rgba(201,168,76,0.1),transparent 60%),radial-gradient(ellipse 60% 40% at 90% 110%,rgba(201,168,76,0.06),transparent 60%);pointer-events:none;z-index:0}
  .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:20px 18px}
  .header{text-align:center;margin-bottom:32px}
  .logo-ring{width:86px;height:86px;border-radius:26px;background:linear-gradient(135deg,rgba(201,168,76,0.12),rgba(201,168,76,0.06));border:1px solid rgba(201,168,76,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 0 40px rgba(201,168,76,0.12);overflow:hidden}
  .site-logo{width:100%;height:100%;object-fit:cover;display:block}
  .logo-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.18);border-radius:100px;padding:5px 15px;font-size:10px;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
  .logo-badge span{width:6px;height:6px;background:var(--gold);border-radius:50%}
  h1{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;background:linear-gradient(135deg,#f0ede8,#d4af37 60%,#c9a84c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
  .subtitle{color:var(--muted);font-size:13px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:28px 24px;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(201,168,76,0.04),0 24px 48px rgba(0,0,0,0.4)}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent)}
  .section-label{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin:0 0 18px;display:flex;align-items:center;gap:8px}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .field{position:relative;margin-bottom:14px}
  .field label{display:block;font-size:11px;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;transition:color 0.2s}
  .field:focus-within label{color:var(--gold)}
  .fi{position:absolute;left:14px;top:38px;font-size:14px;pointer-events:none}
  input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:15px;padding:13px 13px 13px 42px;outline:none;transition:border-color 0.25s,background 0.25s;appearance:none}
  input::placeholder{color:#504840}
  input:focus{border-color:rgba(201,168,76,0.35);background:#1e1e2e}
  .field.shake input{animation:shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97)}
  .err-msg{font-size:12px;color:#f87171;font-family:'Inter',sans-serif;font-weight:600;margin-top:6px;display:none}
  .btn{width:100%;padding:15px;background:linear-gradient(135deg,#c9a84c,#d4af37);border:none;border-radius:13px;color:#0a0a10;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:all 0.2s;box-shadow:0 6px 24px rgba(201,168,76,0.25);margin-top:6px}
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(201,168,76,0.35)}
  .btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
  .note{text-align:center;font-size:11px;color:var(--muted);margin-top:16px;font-family:'Inter',sans-serif;line-height:1.6}
  .note strong{color:var(--gold)}
  .footer-credit{text-align:center;margin-top:24px;padding:12px;border-top:1px solid var(--border)}
  .footer-credit p{font-size:11px;color:var(--muted);font-family:'Inter',sans-serif}
  .footer-credit strong{color:var(--gold)}
  body{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
  input{font-size:16px!important}
  #toast{position:fixed;top:20px;right:20px;z-index:999;background:var(--surface);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:12px 18px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,0.5);opacity:0;transform:translateY(-10px);transition:0.25s;pointer-events:none;max-width:320px}
  #particleCanvas{position:fixed;inset:0;z-index:1;pointer-events:none}
  .floating-orbs{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
  .floating-orbs .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18}
  .floating-orbs .orb:nth-child(1){width:320px;height:320px;background:var(--gold);top:-15%;left:-10%}
  .floating-orbs .orb:nth-child(2){width:260px;height:260px;background:var(--teal);bottom:-12%;right:-8%}
  .floating-orbs .orb:nth-child(3){width:200px;height:200px;background:var(--gold-dark);top:40%;left:50%;opacity:0.08}
  @media(max-width:480px){.container{padding-left:12px!important;padding-right:12px!important}.brand-logo{width:52px!important;height:52px!important}.logo-badge{padding:4px 10px!important;font-size:9px!important}.header-btns{gap:6px!important}.btn-primary,.btn{padding:8px 12px!important;font-size:11px!important;min-height:44px}.stat-card{padding:12px 14px!important}.filters{gap:8px!important}.search-wrap input{padding:14px 14px 14px 40px!important;font-size:16px!important}.card{padding:22px 18px}h1{font-size:26px}}
</style>
</head>
<body>
<div class="welcome-screen" id="welcomeScreen" aria-hidden="true">
  <div class="welcome-card">
    <img class="welcome-logo" src="Usamaz-logo.png" alt="">
    <div class="welcome-title">Welcome</div>
    <div class="welcome-sub">Usamaz CRM</div>
  </div>
</div>
<div id="toast"></div>
<div class="grid-bg"></div>
<div class="floating-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="wrap">

  <div class="header">
    <div class="logo-ring"><img class="site-logo" src="Usamaz-logo.png" alt="Usamaz CRM logo"></div>
    <div class="logo-badge"><span></span> Usamaz CRM</div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to access your doctors directory</p>
  </div>

  <div class="card">
    <div class="section-label">Admin Login</div>

    <div class="field" id="userField">
      <label>Username</label>
      <span class="fi">👤</span>
      <input id="username" type="text" placeholder="Enter username" autocomplete="username" onkeydown="if(event.key==='Enter')tryLogin()">
    </div>

    <div class="field" id="passField">
      <label>Password</label>
      <span class="fi">🔑</span>
      <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')tryLogin()">
      <div class="err-msg" id="errMsg">⚠️ Incorrect username or password</div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="tryLogin()">
      <span class="btn-shine"></span>
      <span id="loginBtnText">Sign In →</span>
    </button>

    <div class="divider"><span>or</span></div>

    <button class="btn-guest" onclick="guestLogin()">
      👁️ Continue as Guest &nbsp;<span class="guest-badge">VIEW ONLY</span>
    </button>
  </div>

  <div class="footer">
    <p>Built by <strong>Abdelrahman Usama</strong> · <a href="https://instagram.com/a.usama56" target="_blank">@a.usama56</a></p>
  </div>

</div>

<script>
  const ADMIN_USER = 'ausama56';
  const ADMIN_PASS = '2002';
  const SESSION_KEY = 'crm_session';
  const INACTIVITY_MS = 60 * 60 * 1000; // 1 hour

  // If already logged in, redirect straight to dashboard
  (function checkExisting() {
    const s = getSession();
    if (s) {
      const dest = sessionStorage.getItem('crm_redirect') || 'dashboard.html';
      sessionStorage.removeItem('crm_redirect');
      location.href = dest;
    }
  })();

  function getSession() {
    try {
      const raw = localStorage.getItem(SESSION_KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (Date.now() - s.lastActive > INACTIVITY_MS) {
        localStorage.removeItem(SESSION_KEY);
        return null;
      }
      return s;
    } catch { return null; }
  }

  function setSession(role) {
    localStorage.setItem(SESSION_KEY, JSON.stringify({ role, lastActive: Date.now() }));
  }

  function tryLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    if (u === ADMIN_USER && p === ADMIN_PASS) {
      btn.classList.add('loading');
      document.getElementById('loginBtnText').textContent = 'Signing in…';
      setSession('admin');
      setTimeout(() => {
        const dest = sessionStorage.getItem('crm_redirect') || 'dashboard.html';
        sessionStorage.removeItem('crm_redirect');
        location.href = dest;
      }, 700);
    } else {
      // Shake both fields & show error
      ['userField','passField'].forEach(id => {
        const f = document.getElementById(id);
        f.classList.remove('shake');
        void f.offsetWidth; // reflow
        f.classList.add('shake');
      });
      document.getElementById('errMsg').classList.add('show');
      document.getElementById('password').value = '';
    }
  }

  function guestLogin() {
    setSession('guest');
    const dest = sessionStorage.getItem('crm_redirect') || 'dashboard.html';
    sessionStorage.removeItem('crm_redirect');
    location.href = dest;
  }
window.toast=function(m){var t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';t.style.transform='translateY(0)';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';t.style.transform='translateY(-10px)'},2500)};</script>
<script>
// ── INSANE UPGRADES ──
(function(){const c=document.createElement('canvas');c.id='particleCanvas';document.body.prepend(c);const x=c.getContext('2d');let p=[];const s=['💊','🩺','❤️','⚕️','🏥','+'];function rs(){c.width=innerWidth;c.height=innerHeight}rs();addEventListener('resize',rs);class P{constructor(){this.R()}R(){this.x=Math.random()*c.width;this.y=c.height+20;this.s=12+Math.random()*16;this.sy=-(.3+Math.random()*.7);this.sx=(Math.random()-.5)*.5;this.sym=s[Math.floor(Math.random()*s.length)];this.o=.2+Math.random()*.3;this.r=Math.random()*Math.PI*2;this.rs=(Math.random()-.5)*.02}update(){this.x+=this.sx;this.y+=this.sy;this.r+=this.rs;if(this.y<-30)this.R()}draw(){x.save();x.globalAlpha=this.o;x.translate(this.x,this.y);x.rotate(this.r);x.font=this.s+'px sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(this.sym,0,0);x.restore()}}for(let i=0;i<18;i++){const n=new P();n.y=Math.random()*c.height;p.push(n)}function L(){x.clearRect(0,0,c.width,c.height);p.forEach(v=>{v.update();v.draw()});requestAnimationFrame(L)}L()})();

(function(){document.querySelectorAll('.card').forEach(e=>{e.classList.add('tilt-3d');e.addEventListener('mousemove',ev=>{const r=e.getBoundingClientRect(),x=ev.clientX-r.left,y=ev.clientY-r.top;const ry=(y-r.height/2)/r.height/2*-10,rx=(x-r.width/2)/r.width/2*10;e.style.transform='perspective(600px) rotateX('+ry+'deg) rotateY('+rx+'deg) scale3d(1.015,1.015,1.015)'});e.addEventListener('mouseleave',()=>{e.style.transform='perspective(600px) rotateX(0deg) rotateY(0deg) scale3d(1,1,1)'})})})();

(function(){document.querySelectorAll('.btn-login,.btn-guest').forEach(b=>{b.classList.add('ripple');b.addEventListener('click',function(ev){const r=this.getBoundingClientRect(),sp=document.createElement('span');sp.className='ripple-effect';sp.style.cssText='left:'+(ev.clientX-r.left)+'px;top:'+(ev.clientY-r.top)+'px;width:40px;height:40px';this.appendChild(sp);setTimeout(()=>sp.remove(),650)})})})();

(function(){const o=new IntersectionObserver(e=>{e.forEach(en=>{if(en.isIntersecting)en.target.classList.add('visible')})},{threshold:.08});document.querySelectorAll('.card').forEach(el=>{el.classList.add('reveal');o.observe(el)})})();

(function(){document.querySelectorAll('.card').forEach(e=>e.classList.add('glow-hover'))})();
window.toast=function(m){var t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';t.style.transform='translateY(0)';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';t.style.transform='translateY(-10px)'},2500)};</script>
</body>
</html>
