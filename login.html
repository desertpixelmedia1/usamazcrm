<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Usamaz CRM">
<meta name="theme-color" content="#0a0a10">
<title>Usamaz CRM — Login</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a10;--surface:#12121a;--surface2:#1a1a26;--border:rgba(201,168,76,0.1);--gold:#c9a84c;--gold-light:#d4af37;--gold-dark:#a8882e;--text:#f0ede8;--muted:#8a8280}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 10% -10%,rgba(201,168,76,0.08),transparent 60%),radial-gradient(ellipse 60% 40% at 90% 110%,rgba(201,168,76,0.05),transparent 60%);pointer-events:none;z-index:0}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.floating-orbs{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.floating-orbs .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18}
.floating-orbs .orb:nth-child(1){width:320px;height:320px;background:var(--gold);top:-15%;left:-10%}
.floating-orbs .orb:nth-child(2){width:260px;height:260px;background:var(--gold-dark);bottom:-12%;right:-8%}
.floating-orbs .orb:nth-child(3){width:200px;height:200px;background:var(--gold);top:40%;left:50%;opacity:0.08}
.wrap{position:relative;z-index:1;width:100%;max-width:400px;padding:24px 20px;margin:0 auto}
.logo-ring{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,rgba(201,168,76,0.1),rgba(201,168,76,0.05));border:1px solid rgba(201,168,76,0.18);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 0 30px rgba(201,168,76,0.08);overflow:hidden}
.site-logo{width:100%;height:100%;object-fit:cover;display:block}
h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;background:linear-gradient(135deg,#f0ede8,#d4af37 60%,#c9a84c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px}
.sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px 20px;position:relative;box-shadow:0 16px 40px rgba(0,0,0,0.35)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent)}
.field{position:relative;margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;transition:color 0.2s}
.field:focus-within label{color:var(--gold)}
input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;padding:14px 14px 14px 42px;outline:none;transition:border-color 0.25s;appearance:none;-webkit-appearance:none}
input::placeholder{color:#504840}
input:focus{border-color:rgba(201,168,76,0.35);background:#1e1e2e}
.fi{position:absolute;left:14px;top:39px;font-size:15px;pointer-events:none}
.field.shake input{animation:shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97)}
.err-msg{font-size:12px;color:#f87171;font-weight:600;margin-top:8px;display:none;text-align:center}
.err-msg.show{display:block}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#c9a84c,#d4af37);border:none;border-radius:12px;color:#0a0a10;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;letter-spacing:0.5px;cursor:pointer;transition:all 0.2s;box-shadow:0 6px 20px rgba(201,168,76,0.2);margin-top:6px;min-height:52px}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(201,168,76,0.3)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn.loading{pointer-events:none;opacity:0.7}
.footer{text-align:center;margin-top:20px;padding:14px 0 0;font-size:11px;color:var(--muted);font-family:'Inter',sans-serif}
.footer strong{color:var(--gold)}
/* ── Welcome Screen ── */
.welcome{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);transition:opacity 0.6s,transform 0.6s;will-change:opacity,transform}
.welcome.hide{opacity:0;transform:scale(1.05);pointer-events:none}
.welcome-logo{width:100px;height:100px;border-radius:28px;object-fit:cover;border:1px solid rgba(201,168,76,0.2);box-shadow:0 0 40px rgba(201,168,76,0.1);margin-bottom:24px}
.welcome-title{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;background:linear-gradient(135deg,#f0ede8,#d4af37 60%,#c9a84c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;line-height:1.2}
.welcome-sub{color:var(--muted);font-size:15px;margin-top:8px;text-align:center;letter-spacing:0.3px}
.welcome-btn{margin-top:40px;padding:14px 48px;background:linear-gradient(135deg,#c9a84c,#d4af37);border:none;border-radius:50px;color:#0a0a10;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s;box-shadow:0 6px 24px rgba(201,168,76,0.2);letter-spacing:0.5px}
.welcome-btn:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(201,168,76,0.3)}
.welcome-btn:active{transform:translateY(0)}
#toast{position:fixed;top:20px;right:20px;z-index:999;background:var(--surface);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:12px 18px;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,0.5);opacity:0;transform:translateY(-10px);transition:0.25s;pointer-events:none;max-width:320px}
#particleCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.divider{display:flex;align-items:center;gap:12px;margin:14px 0 12px;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-guest{width:100%;padding:14px;background:transparent;border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:6px;min-height:48px}
.btn-guest:hover{background:rgba(201,168,76,0.06);border-color:rgba(201,168,76,0.25)}
.btn-guest:active{transform:scale(0.98)}
.guest-badge{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--gold);background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.2);border-radius:4px;padding:2px 7px}
body{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;overscroll-behavior:none;-webkit-overflow-scrolling:touch}
input{font-size:16px!important}body{text-size-adjust:100%;-webkit-text-size-adjust:100%}
@media(max-width:480px){.wrap{padding:16px 14px}.logo-ring{width:64px;height:64px;border-radius:20px}h1{font-size:24px}.card{padding:18px 16px}.btn{min-height:48px;padding:13px}.welcome-logo{width:80px;height:80px;border-radius:22px}.welcome-title{font-size:28px}.welcome-btn{padding:12px 36px;font-size:14px}}
</style>
</head>
<body>
<div class="welcome" id="welcomeScreen">
  <img class="welcome-logo" src="Usamaz-logo.png" alt="Usamaz CRM">
  <div class="welcome-title">Welcome to<br>Usamaz CRM</div>
  <div class="welcome-sub">Doctor Management Platform</div>
  <button class="welcome-btn" onclick="dismissWelcome()">Get Started</button>
</div>
<div id="toast"></div>
<div class="grid-bg"></div>
<div class="floating-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="wrap" id="loginWrap" style="opacity:0;transform:translateY(20px);transition:opacity 0.6s,transform 0.6s">

  <div class="logo-ring"><img class="site-logo" src="Usamaz-logo.png" alt="Usamaz CRM"></div>
  <h1>Welcome Back</h1>
  <p class="sub">Sign in to continue</p>

  <div class="card">
    <div class="field" id="userField">
      <label>Username</label>
      <span class="fi">👤</span>
      <input id="username" type="text" placeholder="Enter username" autocomplete="username" autocapitalize="off" onkeydown="if(event.key==='Enter')tryLogin()">
    </div>
    <div class="field" id="passField">
      <label>Password</label>
      <span class="fi">🔑</span>
      <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')tryLogin()">
      <div class="err-msg" id="errMsg">Incorrect username or password</div>
    </div>
    <button class="btn" id="loginBtn" onclick="tryLogin()">Sign In</button>

    <div class="divider"><span>or</span></div>

    <button class="btn-guest" onclick="guestLogin()">
      👁️ Continue as Guest &nbsp;<span class="guest-badge">VIEW ONLY</span>
    </button>
  </div>

  <div class="footer">Built by <strong>Abdelrahman Usama</strong> · <a href="https://instagram.com/a.usama56" target="_blank" style="color:var(--gold);text-decoration:none">@a.usama56</a></div>

</div>

<script>
const ADMIN_USER = 'ausama56';
const ADMIN_PASS = '2002';
const SESSION_KEY = 'crm_session';
const INACTIVITY_MS = 3600000;

(function checkSession() {
  const s = getSession();
  if (s) {
    const dest = sessionStorage.getItem('crm_redirect') || 'dashboard.html';
    sessionStorage.removeItem('crm_redirect');
    location.href = dest;
  }
})();

function getSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (Date.now() - s.lastActive > INACTIVITY_MS) {
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    return s;
  } catch { return null; }
}

function setSession(role) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({ role, lastActive: Date.now() }));
}

function dismissWelcome() {
  const w = document.getElementById('welcomeScreen');
  w.classList.add('hide');
  setTimeout(() => {
    w.style.display = 'none';
    document.getElementById('loginWrap').style.opacity = '1';
    document.getElementById('loginWrap').style.transform = 'translateY(0)';
    setTimeout(() => document.getElementById('username').focus(), 300);
  }, 500);
}

function tryLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  if (!u || !p) {
    document.getElementById('errMsg').textContent = 'Please enter username and password';
    document.getElementById('errMsg').classList.add('show');
    return;
  }
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    btn.textContent = 'Signing in…';
    btn.disabled = true;
    setSession('admin');
    setTimeout(() => {
      const dest = sessionStorage.getItem('crm_redirect') || 'dashboard.html';
      sessionStorage.removeItem('crm_redirect');
      location.href = dest;
    }, 600);
  } else {
    ['userField','passField'].forEach(id => {
      const f = document.getElementById(id);
      f.classList.remove('shake');
      void f.offsetWidth;
      f.classList.add('shake');
    });
    document.getElementById('errMsg').textContent = 'Incorrect username or password';
    document.getElementById('errMsg').classList.add('show');
    document.getElementById('password').value = '';
  }
}
function guestLogin() {
  setSession('guest');
  const dest = sessionStorage.getItem('crm_redirect') || 'dashboard.html';
  sessionStorage.removeItem('crm_redirect');
  location.href = dest;
}
window.toast=function(m){var t=document.getElementById('toast');t.textContent=m;t.style.opacity='1';t.style.transform='translateY(0)';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';t.style.transform='translateY(-10px)'},2500)};
</script>
</body>
</html>
